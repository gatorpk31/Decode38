[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

# Clean URL for admin page
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Route /api/* to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
